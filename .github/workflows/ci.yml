name: CI
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  browser:
    strategy:
      matrix:
        browser:
          - firefox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: corepack enable
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: .yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - run: yarn install --immutable
      - run: yarn playwright install --with-deps ${{ matrix.browser }}
      - run: yarn build
      - run: yarn workspaces foreach --all --include 'engines/query-sparql' run prepare
      #- run: yarn workspaces foreach --all --include 'engines/query-sparql' run browser
      - run: yarn workspaces foreach --all --include 'engines/query-sparql' run playwright test --browser ${{ matrix.browser }}

