name: CI
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEFAULT_NODE_VERSION: 22.x

jobs:

  linter:
    name: Linter
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js ${{ env.DEFAULT_NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.DEFAULT_NODE_VERSION }}
      - name: Enable Corepack
        run: corepack enable
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Load Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install project dependencies
        run: yarn install --immutable
      - name: Run linter
        run: yarn run lint

  unittest:
    name: Unit tests
    needs: linter
    strategy:
      matrix:
        os:
          - ubuntu-latest
        #  - macos-latest
        #  - windows-latest
        node-version:
          - 18.x
          - 20.x
          - 22.x
    runs-on: ${{ matrix.os }}
    steps:
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Enable Corepack
        run: corepack enable
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Load Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install project dependencies
        run: yarn install --immutable
      - name: Build monorepo
        run: yarn run build
      - name: Run unit tests
        run: yarn run test:ci
      - name: Submit coverage results
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.github_token }}
          flag-name: run-${{ matrix.node-version }}
          parallel: true

  coveralls:
    name: Coverage check
    needs: unittest
    runs-on: ubuntu-latest
    steps:
      - name: Consolidate test coverage from different jobs
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.github_token }}
          parallel-finished: true

  depcheck:
    name: Dependency check
    needs: linter
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js ${{ env.DEFAULT_NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.DEFAULT_NODE_VERSION }}
      - name: Enable Corepack
        run: corepack enable
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Load Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install project dependencies
        run: yarn install --immutable
      - name: Build monorepo
        run: yarn run build
      - name: Run depcheck
        run: yarn run depcheck
        
  docs:
    name: Documentation
    needs: linter
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js ${{ env.DEFAULT_NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.DEFAULT_NODE_VERSION }}
      - name: Enable Corepack
        run: corepack enable
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Load Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install project dependencies
        run: yarn install --immutable
      - name: Build documentation
        run: yarn run doc

  browsertest:
    name: Browser tests
    needs: unittest
    strategy:
      matrix:
        browser:
          - firefox
          - chromium
          - webkit
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js ${{ env.DEFAULT_NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.DEFAULT_NODE_VERSION }}
      - name: Enable Corepack
        run: corepack enable
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Load Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install project dependencies
        run: yarn install --immutable
      - name: Install web browser
        run: yarn playwright install --with-deps ${{ matrix.browser }}
      - name: Build monorepo
        run: yarn run build
      - name: Prepare query engine bundles
        run: yarn workspaces foreach --all --include 'engines/query-sparql' run build:engine
      - name: Start SPARQL endpoint
        run: .github/jena-fuseki/endpoint.sh start "jenafuseki-${{ matrix.browser }}"
      - name: Run browser tests
        run: yarn playwright test --config engines/query-sparql/playwright.config.ts --browser ${{ matrix.browser }}
      - name: Stop SPARQL endpoint
        run: .github/jena-fuseki/endpoint.sh stop "jenafuseki-${{ matrix.browser }}"
        if: always()

  spectest:
    name: Specification tests
    needs: unittest
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js ${{ env.DEFAULT_NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.DEFAULT_NODE_VERSION }}
      - name: Enable Corepack
        run: corepack enable
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Load Yarn cache
        uses: actions/cache@v4
        with:
          path: .yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install project dependencies
        run: yarn install --immutable
      - name: Build monorepo
        run: yarn run build
      - name: Run spec tests
        run: npx lerna run spec --concurrency 1
      - name: Run integration tests
        run: npx lerna run integration --concurrency 1
