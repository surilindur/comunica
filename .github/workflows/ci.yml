name: CI
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEFAULT_NODE_VERSION: 22.x
  DOCUMENTATION_BRANCH: feat/workflow-updates

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js ${{ env.DEFAULT_NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.DEFAULT_NODE_VERSION }}
      - name: Enable Corepack
        run: corepack enable
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Load Yarn cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn
            **/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install project dependencies
        run: yarn install --immutable
      - name: Run linter
        run: yarn run lint

  unittest:
    name: Unit tests
    needs: lint
    strategy:
      matrix:
        os:
          - ubuntu-latest
          # - macos-latest
          # - windows-latest
        node-version:
          # - 18.x
          # - 20.x
          - 22.x
    runs-on: ${{ matrix.os }}
    steps:
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Enable Corepack
        run: corepack enable
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Load Yarn cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn
            **/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install project dependencies
        run: yarn install --immutable
      - name: Compile TypeScript to JavaScript
        run: yarn run build:ts
      - name: Generate Components.js components
        run: yarn run build:components
      - name: Run unit tests
        run: yarn jest --selectProjects packages --ci --runInBand
      - name: Submit coverage results
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.github_token }}
          flag-name: run-${{ matrix.node-version }}
          parallel: true

  enginetest:
    name: Engine tests
    needs: unittest
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js ${{ env.DEFAULT_NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.DEFAULT_NODE_VERSION }}
      - name: Enable Corepack
        run: corepack enable
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Load Yarn cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn
            **/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install project dependencies
        run: yarn install --immutable
      - name: Compile TypeScript to JavaScript
        run: yarn run build:ts
      - name: Generate Components.js components
        run: yarn run build:components
      - name: Generate engine bundles
        run: yarn run build:engines
      - name: Run engine tests
        run: yarn jest --selectProjects engines --ci --runInBand

  spectest:
    name: Specification tests
    needs: unittest
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js ${{ env.DEFAULT_NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.DEFAULT_NODE_VERSION }}
      - name: Enable Corepack
        run: corepack enable
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Load Yarn cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn
            **/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Load RDF test suite cache
        uses: actions/cache@v4
        with:
          path: |
            .rdf-test-suite-cache
            .rdf-test-suite-ldf-cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install project dependencies
        run: yarn install --immutable
      - name: Compile TypeScript to JavaScript
        run: yarn run build:ts
      - name: Generate Components.js components
        run: yarn run build:components
      - name: Generate engine bundles
        run: yarn run build:engines
      - name: Run spec tests
        run: yarn lerna run spec
      - name: Run spec integration tests
        run: yarn lerna run integration --concurrency 1

  browsertest:
    name: Browser tests
    needs: unittest
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js ${{ env.DEFAULT_NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.DEFAULT_NODE_VERSION }}
      - name: Enable Corepack
        run: corepack enable
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Load Yarn cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn
            **/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install project dependencies
        run: yarn install --immutable
      - name: Compile TypeScript to JavaScript
        run: yarn run build:ts
      - name: Generate Components.js components
        run: yarn run build:components
      - name: Generate engine bundles
        run: yarn run build:engines
      - name: Run browser tests
        run: yarn run test:browser

  depcheck:
    name: Depcheck
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js ${{ env.DEFAULT_NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.DEFAULT_NODE_VERSION }}
      - name: Enable Corepack
        run: corepack enable
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Load Yarn cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn
            **/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install project dependencies
        run: yarn install --immutable
      - name: Compile TypeScript to JavaScript so depcheck will work as intended
        run: yarn run build:ts
      - name: Run depcheck
        run: yarn run depcheck

  docs:
    name: Documentation
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Use Node.js ${{ env.DEFAULT_NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.DEFAULT_NODE_VERSION }}
      - name: Enable Corepack
        run: corepack enable
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Load Yarn cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn
            **/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install project dependencies
        run: yarn install --immutable
      - name: Build documentation
        run: yarn run doc
      - name: Prepare artifact
        uses: actions/upload-pages-artifact@v3
        if: success() && github.ref == 'refs/heads/${{ env.DOCUMENTATION_BRANCH }}'
        with:
          path: documentation
          name: documentation
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: documentation

  coveralls:
    name: Coveralls
    needs: unittest
    runs-on: ubuntu-latest
    steps:
      - name: Consolidate test coverage from different jobs
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.github_token }}
          parallel-finished: true
